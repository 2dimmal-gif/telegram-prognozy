<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Прогнозы ЧМ 2026</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --tg-bg: var(--tg-theme-bg-color, #1a1a2e);
      --tg-text: var(--tg-theme-text-color, #ffffff);
      --tg-hint: var(--tg-theme-hint-color, #aaaaaa);
      --tg-link: var(--tg-theme-link-color, #6c9bea);
      --tg-button: var(--tg-theme-button-color, #2ea44f);
      --tg-button-text: var(--tg-theme-button-text-color, #ffffff);
      --tg-secondary-bg: var(--tg-theme-secondary-bg-color, #16213e);
      --tg-card: rgba(255,255,255,0.06);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--tg-bg);
      color: var(--tg-text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      min-height: 100vh;
      padding-bottom: 100px;
    }

    header {
      background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
      padding: 20px 16px 16px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header .trophy {
      font-size: 36px;
      display: block;
      margin-bottom: 6px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    header p {
      font-size: 12px;
      color: var(--tg-hint);
      margin-top: 4px;
    }

    .groups-container {
      padding: 12px;
    }

    .group-section {
      margin-bottom: 16px;
    }

    .group-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--tg-hint);
      padding: 0 4px 8px;
    }

    .match-card {
      background: var(--tg-card);
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .team {
      flex: 1;
      text-align: center;
    }

    .team-flag {
      font-size: 26px;
      display: block;
      margin-bottom: 3px;
    }

    .team-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--tg-text);
      white-space: nowrap;
    }

    .score-inputs {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .score-input {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: var(--tg-text);
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      outline: none;
      -webkit-appearance: none;
      -moz-appearance: textfield;
      transition: border-color 0.2s, background 0.2s;
    }

    .score-input:focus {
      border-color: var(--tg-button);
      background: rgba(255,255,255,0.12);
    }

    .score-input::-webkit-inner-spin-button,
    .score-input::-webkit-outer-spin-button {
      -webkit-appearance: none;
    }

    .score-separator {
      font-size: 18px;
      font-weight: 700;
      color: var(--tg-hint);
      flex-shrink: 0;
    }

    .match-date {
      font-size: 10px;
      color: var(--tg-hint);
      text-align: center;
      margin-top: 6px;
    }

    .match-card-inner {
      width: 100%;
    }

    .match-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .submit-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      background: var(--tg-bg);
      border-top: 1px solid rgba(255,255,255,0.08);
      z-index: 20;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius);
      border: none;
      background: var(--tg-button);
      color: var(--tg-button-text);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.2px;
    }

    .submit-btn:active {
      opacity: 0.85;
      transform: scale(0.98);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .progress-bar {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--tg-button);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 11px;
      color: var(--tg-hint);
      text-align: center;
      margin-bottom: 8px;
    }

    .alert {
      margin: 12px;
      padding: 12px 14px;
      border-radius: var(--radius);
      background: rgba(46, 164, 79, 0.15);
      border: 1px solid rgba(46, 164, 79, 0.3);
      color: #4caf50;
      font-size: 13px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

<header>
  <span class="trophy">🏆</span>
  <h1>Прогнозы ЧМ 2026</h1>
  <p>Введи счёт для каждого матча</p>
</header>

<div class="groups-container" id="matchesContainer"></div>

<div class="alert" id="successAlert">✅ Прогнозы отправлены! Удачи! 🤞</div>

<div class="submit-bar">
  <div class="progress-text" id="progressText">0 из 0 матчей заполнено</div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <button class="submit-btn" id="submitBtn" onclick="submitPredictions()">
    Отправить прогнозы ⚽
  </button>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  // ─── CURRENT ROUND ───────────────────────────────────────────────
  // Change this number manually and re-upload to GitHub Pages
  // to show a different round of matches.
  const currentRound = 1;
  // ─────────────────────────────────────────────────────────────────

  // ─── MATCH FIXTURES ──────────────────────────────────────────────
  // Each match has a `round` field. Only matches where
  // match.round === currentRound will be shown.
  const matchGroups = [
    {
      label: "Группа A",
      matches: [
        { id: "a1", round: 1, home: "USA",      homeFlag: "🇺🇸", away: "Canada",    awayFlag: "🇨🇦", date: "12 июн" },
        { id: "a2", round: 1, home: "Uruguay",  homeFlag: "🇺🇾", away: "Portugal",  awayFlag: "🇵🇹", date: "12 июн" },
        { id: "a3", round: 2, home: "USA",      homeFlag: "🇺🇸", away: "Uruguay",   awayFlag: "🇺🇾", date: "17 июн" },
        { id: "a4", round: 2, home: "Canada",   homeFlag: "🇨🇦", away: "Portugal",  awayFlag: "🇵🇹", date: "17 июн" },
        { id: "a5", round: 3, home: "Canada",   homeFlag: "🇨🇦", away: "Uruguay",   awayFlag: "🇺🇾", date: "22 июн" },
        { id: "a6", round: 3, home: "Portugal", homeFlag: "🇵🇹", away: "USA",       awayFlag: "🇺🇸", date: "22 июн" },
      ]
    },
    {
      label: "Группа B",
      matches: [
        { id: "b1", round: 1, home: "Argentina", homeFlag: "🇦🇷", away: "Chile",     awayFlag: "🇨🇱", date: "13 июн" },
        { id: "b2", round: 1, home: "England",   homeFlag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", away: "Peru",      awayFlag: "🇵🇪", date: "13 июн" },
        { id: "b3", round: 2, home: "Argentina", homeFlag: "🇦🇷", away: "England",   awayFlag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", date: "18 июн" },
        { id: "b4", round: 2, home: "Chile",     homeFlag: "🇨🇱", away: "Peru",      awayFlag: "🇵🇪", date: "18 июн" },
        { id: "b5", round: 3, home: "Chile",     homeFlag: "🇨🇱", away: "England",   awayFlag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", date: "23 июн" },
        { id: "b6", round: 3, home: "Peru",      homeFlag: "🇵🇪", away: "Argentina", awayFlag: "🇦🇷", date: "23 июн" },
      ]
    },
    {
      label: "Группа C",
      matches: [
        { id: "c1", round: 1, home: "France",  homeFlag: "🇫🇷", away: "Mexico",  awayFlag: "🇲🇽", date: "14 июн" },
        { id: "c2", round: 1, home: "Germany", homeFlag: "🇩🇪", away: "Japan",   awayFlag: "🇯🇵", date: "14 июн" },
        { id: "c3", round: 2, home: "France",  homeFlag: "🇫🇷", away: "Germany", awayFlag: "🇩🇪", date: "19 июн" },
        { id: "c4", round: 2, home: "Mexico",  homeFlag: "🇲🇽", away: "Japan",   awayFlag: "🇯🇵", date: "19 июн" },
        { id: "c5", round: 3, home: "Mexico",  homeFlag: "🇲🇽", away: "Germany", awayFlag: "🇩🇪", date: "24 июн" },
        { id: "c6", round: 3, home: "Japan",   homeFlag: "🇯🇵", away: "France",  awayFlag: "🇫🇷", date: "24 июн" },
      ]
    },
    {
      label: "Группа D",
      matches: [
        { id: "d1", round: 1, home: "Brazil",  homeFlag: "🇧🇷", away: "Nigeria",  awayFlag: "🇳🇬", date: "15 июн" },
        { id: "d2", round: 1, home: "Spain",   homeFlag: "🇪🇸", away: "Morocco",  awayFlag: "🇲🇦", date: "15 июн" },
        { id: "d3", round: 2, home: "Brazil",  homeFlag: "🇧🇷", away: "Spain",    awayFlag: "🇪🇸", date: "20 июн" },
        { id: "d4", round: 2, home: "Nigeria", homeFlag: "🇳🇬", away: "Morocco",  awayFlag: "🇲🇦", date: "20 июн" },
        { id: "d5", round: 3, home: "Nigeria", homeFlag: "🇳🇬", away: "Spain",    awayFlag: "🇪🇸", date: "25 июн" },
        { id: "d6", round: 3, home: "Morocco", homeFlag: "🇲🇦", away: "Brazil",   awayFlag: "🇧🇷", date: "25 июн" },
      ]
    },
  ];
  // ─────────────────────────────────────────────────────────────────

  // Only matches for the current round
  const roundMatches = matchGroups.flatMap(g => g.matches).filter(m => m.round === currentRound);
  const totalMatches = roundMatches.length;

  function renderMatches() {
    const container = document.getElementById("matchesContainer");
    container.innerHTML = "";

    document.querySelector("header p").textContent =
      `Тур ${currentRound} — введи счёт для каждого матча`;

    for (const group of matchGroups) {
      const groupRoundMatches = group.matches.filter(m => m.round === currentRound);
      if (groupRoundMatches.length === 0) continue;

      const section = document.createElement("div");
      section.className = "group-section";

      const label = document.createElement("div");
      label.className = "group-label";
      label.textContent = group.label;
      section.appendChild(label);

      for (const match of groupRoundMatches) {
        const card = document.createElement("div");
        card.className = "match-card";
        card.innerHTML = `
          <div class="match-card-inner">
            <div class="match-row">
              <div class="team">
                <span class="team-flag">${match.homeFlag || "🏳️"}</span>
                <span class="team-name">${match.home}</span>
              </div>
              <div class="score-inputs">
                <input
                  class="score-input"
                  id="home_${match.id}"
                  type="number"
                  min="0"
                  max="99"
                  placeholder="0"
                  oninput="updateProgress()"
                  inputmode="numeric"
                />
                <span class="score-separator">–</span>
                <input
                  class="score-input"
                  id="away_${match.id}"
                  type="number"
                  min="0"
                  max="99"
                  placeholder="0"
                  oninput="updateProgress()"
                  inputmode="numeric"
                />
              </div>
              <div class="team">
                <span class="team-flag">${match.awayFlag || "🏳️"}</span>
                <span class="team-name">${match.away}</span>
              </div>
            </div>
            <div class="match-date">${match.date}</div>
          </div>
        `;
        section.appendChild(card);
      }

      container.appendChild(section);
    }

    updateProgress();
  }

  function countFilled() {
    return roundMatches.filter(m => {
      const h = document.getElementById(`home_${m.id}`);
      const a = document.getElementById(`away_${m.id}`);
      return h && a && h.value !== "" && a.value !== "";
    }).length;
  }

  function updateProgress() {
    const filled = countFilled();
    const pct = totalMatches > 0 ? (filled / totalMatches) * 100 : 0;
    document.getElementById("progressFill").style.width = pct + "%";
    document.getElementById("progressText").textContent =
      `${filled} из ${totalMatches} матчей заполнено`;
  }

  function submitPredictions() {
    const predictions = roundMatches.map(match => {
      const hs = document.getElementById(`home_${match.id}`).value;
      const as_ = document.getElementById(`away_${match.id}`).value;
      return {
        round: match.round,
        home: match.home,
        away: match.away,
        home_score: hs !== "" ? parseInt(hs) : null,
        away_score: as_ !== "" ? parseInt(as_) : null,
      };
    }).filter(p => p.home_score !== null && p.away_score !== null);

    if (predictions.length === 0) {
      tg.showAlert("Пожалуйста, заполни хотя бы один прогноз перед отправкой.");
      return;
    }

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.textContent = "Отправка...";

    tg.sendData(JSON.stringify({ round: currentRound, predictions }));
  }

  renderMatches();
</script>
</body>
</html>
